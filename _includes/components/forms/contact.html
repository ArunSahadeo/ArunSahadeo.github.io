<form class="contact-form" action="https://formspree.io/myynjean" method="POST">
    <label for="fullname">
        Full Name
    </label>

    <input type="text" name="fullname" required />

    <label for="_replyto">
        Your Email
    </label>

    <input type="email" name="_replyto" required />

    <label for="comment">
        Please enter your comment or enquiry below.
    </label>

    <textarea name="comment"></textarea>

    <input type="submit" value="Send" />
</form>
